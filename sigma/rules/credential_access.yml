title: Keychain and Credential Store Access on macOS
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: >
    Detects attempts to access macOS Keychain or credential stores.
    Covers both programmatic access via Security framework APIs and
    command-line tools like security(1).
author: Krysti4n16
date: 2026/04/01
modified: 2026/04/01
references:
    - https://attack.mitre.org/techniques/T1555/
    - https://attack.mitre.org/techniques/T1555/001/
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1555.001
logsource:
    category: application
    product: macos
detection:
    keywords:
        - 'keychain unlock failed'
        - 'SecKeychainFind'
        - 'kSecClass'
        - 'certificate verify failed'
    condition: keywords
falsepositives:
    - Legitimate keychain access by user applications
    - System processes: trustd, secd
    - Password managers with proper entitlements
level: high
fields:
    - message
    - process
    - subsystem
    - timestamp